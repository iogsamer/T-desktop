name: 🚀 Build & Release DarkFlix

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 5.0.21)'
        required: false
        default: '5.0.21'
      create_release:
        description: 'Create GitHub Release?'
        required: false
        default: 'true'
        type: boolean

env:
  PROJECT_NAME: darkflix
  APP_DISPLAY_NAME: DarkFlix

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────
  build-x64:
    name: 🏗️ Build x64
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Version ────────────────────────────────────────────────
      - name: 🔢 Get version
        id: get_version
        shell: pwsh
        run: |
          $cmake = Get-Content CMakeLists.txt -Raw
          if ($cmake -match 'project\s*\(\s*darkflix\s+VERSION\s+"?([\d.]+)"?') {
            $ver = $matches[1]
          } elseif ("${{ github.event.inputs.version }}" -ne "") {
            $ver = "${{ github.event.inputs.version }}"
          } else {
            $ver = "5.0.21"
          }
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "Version: $ver"

      # ── MSVC ───────────────────────────────────────────────────
      - name: 🛠️ Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── vcpkg ──────────────────────────────────────────────────
      - name: 📦 Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '80e3748b899d76d8f1701fdbf2a48ba1c6a6df41'

      - name: 📦 Install vcpkg dependencies
        shell: pwsh
        run: |
          vcpkg install `
            openssl:x64-windows-static `
            curl:x64-windows-static `
            nlohmann-json:x64-windows-static `
            webview2:x64-windows-static `
            --triplet x64-windows-static

      # ── Ninja ──────────────────────────────────────────────────
      - name: 🔧 Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      # ── libmpv ─────────────────────────────────────────────────
      - name: 🎬 Download libmpv x64
        shell: pwsh
        run: |
          $url = "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20240317/mpv-dev-x86_64-20240317-git-a3134e7.7z"
          Invoke-WebRequest $url -OutFile mpv-dev-x64.7z
          7z x mpv-dev-x64.7z -ompv-dev-x64 -y
          New-Item -ItemType Directory -Force -Path deps/libmpv/x86_64/include
          New-Item -ItemType Directory -Force -Path deps/libmpv/x86_64
          Copy-Item mpv-dev-x64/include/* deps/libmpv/x86_64/include/ -Recurse -Force
          Copy-Item mpv-dev-x64/libmpv.dll.a deps/libmpv/x86_64/mpv.lib
          Copy-Item mpv-dev-x64/libmpv-2.dll  deps/libmpv/x86_64/libmpv-2.dll

      # ── Discord RPC ────────────────────────────────────────────
      - name: 💬 Download Discord RPC
        shell: pwsh
        run: |
          $url = "https://github.com/discord/discord-rpc/releases/download/v3.4.0/discord-rpc-win.zip"
          Invoke-WebRequest $url -OutFile discord-rpc.zip
          Expand-Archive discord-rpc.zip -DestinationPath discord-rpc-raw
          New-Item -ItemType Directory -Force -Path deps/discord-rpc/win64-static/lib
          New-Item -ItemType Directory -Force -Path deps/discord-rpc/win64-static/include
          Copy-Item discord-rpc-raw/discord-rpc/win64-static/lib/discord-rpc.lib  deps/discord-rpc/win64-static/lib/
          Copy-Item discord-rpc-raw/discord-rpc/include/*                          deps/discord-rpc/win64-static/include/ -Recurse -Force

      # ── CMake Build ────────────────────────────────────────────
      - name: ⚙️ CMake Configure
        shell: pwsh
        run: |
          $vcpkgRoot = "$env:VCPKG_ROOT"
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$vcpkgRoot/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -B cmake-build-release-x64 `
            -S .

      - name: 🔨 Build
        shell: pwsh
        run: |
          cmake --build cmake-build-release-x64 --config Release --parallel

      # ── Dist folder ────────────────────────────────────────────
      # ── Auth server: install npm deps ──────────────────────────
      - name: 📦 Install auth server deps
        shell: pwsh
        run: |
          cd packages/darkflix-auth
          npm install --ignore-scripts --omit=dev
          Write-Host "✅ darkflix-auth dependencies installed"

      - name: 📁 Prepare dist
        shell: pwsh
        run: |
          $dist = "dist/win-x64"
          New-Item -ItemType Directory -Force -Path $dist
          # Main exe
          Copy-Item "cmake-build-release-x64/${{ env.PROJECT_NAME }}.exe" "$dist/${{ env.PROJECT_NAME }}.exe"
          # MPV DLL
          Copy-Item "deps/libmpv/x86_64/libmpv-2.dll" "$dist/"
          # Runtime (if exists in utils/windows)
          if (Test-Path "utils/windows/stremio-runtime.exe") {
            Copy-Item "utils/windows/stremio-runtime.exe" "$dist/"
          }
          if (Test-Path "utils/windows/server.js") {
            Copy-Item "utils/windows/server.js" "$dist/"
          }
          # ffmpeg
          if (Test-Path "utils/windows/ffmpeg") {
            Copy-Item "utils/windows/ffmpeg/*" "$dist/" -Recurse -Force
          }
          # portable_config defaults
          if (Test-Path "utils/stremio") {
            New-Item -ItemType Directory -Force -Path "$dist/portable_config"
            Copy-Item "utils/stremio/*" "$dist/portable_config/" -Recurse -Force
          }
          # ── DarkFlix Auth Server ──────────────────────────────
          New-Item -ItemType Directory -Force -Path "$dist/packages/darkflix-auth"
          Copy-Item "packages/darkflix-auth/src"     "$dist/packages/darkflix-auth/src"     -Recurse -Force
          Copy-Item "packages/darkflix-auth/public"  "$dist/packages/darkflix-auth/public"  -Recurse -Force
          Copy-Item "packages/darkflix-auth/node_modules" "$dist/packages/darkflix-auth/node_modules" -Recurse -Force
          Copy-Item "packages/darkflix-auth/package.json" "$dist/packages/darkflix-auth/package.json"
          # ── Bundle node.exe for the auth server ──────────────
          # Download the Windows node binary matching the runtime version
          $nodeVersion = "v22.12.0"
          $nodeUrl = "https://nodejs.org/dist/$nodeVersion/node-$nodeVersion-win-x64.zip"
          Invoke-WebRequest $nodeUrl -OutFile node-win.zip
          Expand-Archive node-win.zip -DestinationPath node-win-tmp
          Copy-Item "node-win-tmp/node-$nodeVersion-win-x64/node.exe" "$dist/node.exe"
          Write-Host "✅ node.exe bundled: $(Get-Item "$dist/node.exe" | Select-Object -ExpandProperty Length) bytes"
          Write-Host "✅ dist/win-x64 ready:"
          Get-ChildItem $dist | Format-Table Name, Length

      # ── NSIS Installer ─────────────────────────────────────────
      - name: 📦 Install NSIS
        run: choco install nsis -y --no-progress

      - name: 🪟 Build Installer (x64)
        shell: pwsh
        env:
          package_version: ${{ steps.get_version.outputs.version }}
          arch: x64
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          & $nsis "utils/windows/installer/windows-installer.nsi"
          Write-Host "✅ Installer built"

      # ── Upload artifacts ───────────────────────────────────────
      - name: 📤 Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkFlix-${{ steps.get_version.outputs.version }}-x64-exe
          path: cmake-build-release-x64/${{ env.PROJECT_NAME }}.exe
          retention-days: 30

      - name: 📤 Upload Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkFlix-${{ steps.get_version.outputs.version }}-x64-setup
          path: "${{ env.APP_DISPLAY_NAME }} ${{ steps.get_version.outputs.version }}-x64.exe"
          retention-days: 30

      - name: 📤 Upload dist folder
        uses: actions/upload-artifact@v4
        with:
          name: DarkFlix-${{ steps.get_version.outputs.version }}-x64-dist
          path: dist/win-x64/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  build-x86:
    name: 🏗️ Build x86
    runs-on: windows-latest
    needs: build-x64   # run after x64 so version is already printed

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔢 Get version
        id: get_version
        shell: pwsh
        run: |
          $cmake = Get-Content CMakeLists.txt -Raw
          if ($cmake -match 'project\s*\(\s*darkflix\s+VERSION\s+"?([\d.]+)"?') {
            echo "version=$($matches[1])" >> $env:GITHUB_OUTPUT
          } else {
            echo "version=5.0.21" >> $env:GITHUB_OUTPUT
          }

      - name: 🛠️ Setup MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: 📦 Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '80e3748b899d76d8f1701fdbf2a48ba1c6a6df41'

      - name: 📦 Install vcpkg x86 deps
        shell: pwsh
        run: |
          vcpkg install `
            openssl:x86-windows-static `
            curl:x86-windows-static `
            nlohmann-json:x86-windows-static `
            webview2:x86-windows-static `
            --triplet x86-windows-static

      - name: 🔧 Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: 🎬 Download libmpv x86
        shell: pwsh
        run: |
          $url = "https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20240317/mpv-dev-i686-20240317-git-a3134e7.7z"
          Invoke-WebRequest $url -OutFile mpv-dev-x86.7z
          7z x mpv-dev-x86.7z -ompv-dev-x86 -y
          New-Item -ItemType Directory -Force -Path deps/libmpv/i686/include
          Copy-Item mpv-dev-x86/include/* deps/libmpv/i686/include/ -Recurse -Force
          Copy-Item mpv-dev-x86/libmpv.dll.a deps/libmpv/i686/mpv.lib
          Copy-Item mpv-dev-x86/libmpv-2.dll  deps/libmpv/i686/libmpv-2.dll

      - name: 💬 Download Discord RPC x86
        shell: pwsh
        run: |
          $url = "https://github.com/discord/discord-rpc/releases/download/v3.4.0/discord-rpc-win.zip"
          Invoke-WebRequest $url -OutFile discord-rpc.zip
          Expand-Archive discord-rpc.zip -DestinationPath discord-rpc-raw
          New-Item -ItemType Directory -Force -Path deps/discord-rpc/win32-static/lib
          New-Item -ItemType Directory -Force -Path deps/discord-rpc/win32-static/include
          Copy-Item discord-rpc-raw/discord-rpc/win32-static/lib/discord-rpc.lib  deps/discord-rpc/win32-static/lib/
          Copy-Item discord-rpc-raw/discord-rpc/include/*                          deps/discord-rpc/win32-static/include/ -Recurse -Force

      - name: ⚙️ CMake Configure x86
        shell: pwsh
        run: |
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x86-windows-static `
            -B cmake-build-release-x86 -S .

      - name: 🔨 Build x86
        shell: pwsh
        run: cmake --build cmake-build-release-x86 --config Release --parallel

      - name: 📁 Prepare dist x86
        shell: pwsh
        run: |
          $dist = "dist/win-x86"
          New-Item -ItemType Directory -Force -Path $dist
          Copy-Item "cmake-build-release-x86/${{ env.PROJECT_NAME }}.exe" "$dist/${{ env.PROJECT_NAME }}.exe"
          Copy-Item "deps/libmpv/i686/libmpv-2.dll" "$dist/"
          if (Test-Path "utils/windows/stremio-runtime.exe") { Copy-Item "utils/windows/stremio-runtime.exe" "$dist/" }
          if (Test-Path "utils/windows/server.js")            { Copy-Item "utils/windows/server.js"            "$dist/" }

      - name: 📦 Install NSIS
        run: choco install nsis -y --no-progress

      - name: 🪟 Build Installer x86
        shell: pwsh
        env:
          package_version: ${{ steps.get_version.outputs.version }}
          arch: x86
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" "utils/windows/installer/windows-installer.nsi"

      - name: 📤 Upload x86 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DarkFlix-${{ steps.get_version.outputs.version }}-x86-setup
          path: "${{ env.APP_DISPLAY_NAME }} ${{ steps.get_version.outputs.version }}-x86.exe"
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  release:
    name: 🚀 Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-x64, build-x86]
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⬇️ Download x64 setup
        uses: actions/download-artifact@v4
        with:
          name: DarkFlix-${{ needs.build-x64.outputs.version }}-x64-setup
          path: release-files/

      - name: ⬇️ Download x86 setup
        uses: actions/download-artifact@v4
        with:
          name: DarkFlix-${{ needs.build-x64.outputs.version }}-x86-setup
          path: release-files/

      - name: ⬇️ Download x64 exe
        uses: actions/download-artifact@v4
        with:
          name: DarkFlix-${{ needs.build-x64.outputs.version }}-x64-exe
          path: release-files/

      - name: 📋 Generate checksums
        run: |
          cd release-files
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: 🏷️ Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', needs.build-x64.outputs.version) }}
          name: "🎬 DarkFlix v${{ needs.build-x64.outputs.version }}"
          body: |
            ## 🎬 DarkFlix v${{ needs.build-x64.outputs.version }}

            ### 📥 Downloads
            | File | Architecture | Type |
            |------|-------------|------|
            | `DarkFlix ${{ needs.build-x64.outputs.version }}-x64.exe` | 64-bit | 🪟 Installer |
            | `DarkFlix ${{ needs.build-x64.outputs.version }}-x86.exe` | 32-bit | 🪟 Installer |
            | `darkflix.exe` | 64-bit | ⚡ Portable EXE |

            ### ✨ What's New
            - 🟠 Full orange theme throughout the app
            - 🎬 Rebranded as DarkFlix
            - ⚡ Built on latest WebView2 + MPV engine
            - 🖥️ Native 4K playback with hardware decoding
            - 💬 Discord Rich Presence support
            - 🔄 Built-in auto-updater

            ### 📋 Requirements
            - Windows 10/11 (x64 or x86)
            - WebView2 Runtime (auto-installed by the installer)

            ### 🔐 Checksums (SHA256)
            See `SHA256SUMS.txt` in release assets.
          files: |
            release-files/*
          draft: false
          prerelease: false
