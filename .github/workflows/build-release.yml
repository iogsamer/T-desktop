name: 🚀 Build & Release DarkFlix

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 5.0.21)'
        required: false
        default: '5.0.21'

env:
  PROJECT_NAME: darkflix
  APP_DISPLAY_NAME: DarkFlix
  WEBVIEW2_VERSION: 1.0.2849.39

permissions:
  contents: write

jobs:
  build-x64:
    name: 🏗️ Build x64
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔢 Get version
        id: get_version
        shell: pwsh
        run: |
          $raw = Get-Content CMakeLists.txt -Raw
          if ($raw -match 'project\s*\(\s*\w+\s+VERSION\s+"?([\d.]+)"?') {
            $ver = $Matches[1]
          } else {
            $ver = "${{ github.event.inputs.version }}"
            if (-not $ver) { $ver = "5.0.21" }
          }
          "version=$ver" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          Write-Host "Version: $ver"

      - name: 🛠️ Setup MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: ⚡ Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: 💾 Cache vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg
          key: vcpkg-x64-v7-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: vcpkg-x64-v7-

      - name: 📦 Bootstrap vcpkg
        shell: pwsh
        run: |
          $dir = Join-Path $env:GITHUB_WORKSPACE "vcpkg"
          $exe = Join-Path $dir "vcpkg.exe"
          if (Test-Path $exe) {
            Write-Host "vcpkg from cache"
          } else {
            git clone https://github.com/microsoft/vcpkg $dir --depth=1
            cmd /c "`"$dir\bootstrap-vcpkg.bat`" -disableMetrics"
          }
          & $exe version
          Add-Content $env:GITHUB_PATH $dir

      - name: 📦 Install vcpkg packages
        shell: pwsh
        run: |
          $vcpkg = Join-Path $env:GITHUB_WORKSPACE "vcpkg\vcpkg.exe"
          & $vcpkg install openssl:x64-windows-static curl:x64-windows-static nlohmann-json:x64-windows-static --triplet x64-windows-static
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed" }
          Write-Host "✅ vcpkg packages installed"

      - name: 📦 Install WebView2 via NuGet
        shell: pwsh
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE "nuget_wv2"
          nuget install Microsoft.Web.WebView2 -Version $env:WEBVIEW2_VERSION -OutputDirectory $out -NonInteractive
          $pkg = (Get-ChildItem $out -Filter "Microsoft.Web.WebView2.*" | Select-Object -First 1).FullName
          if (-not $pkg) { throw "WebView2 NuGet not found" }
          $ins = Join-Path $env:GITHUB_WORKSPACE "vcpkg\installed\x64-windows-static"
          New-Item -Force -ItemType Directory "$ins\include" | Out-Null
          New-Item -Force -ItemType Directory "$ins\lib"     | Out-Null
          New-Item -Force -ItemType Directory "$ins\share\unofficial-webview2" | Out-Null
          Copy-Item "$pkg\build\native\include\*" "$ins\include\" -Recurse -Force
          if (Test-Path "$pkg\build\native\x64\WebView2LoaderStatic.lib") {
            Copy-Item "$pkg\build\native\x64\WebView2LoaderStatic.lib" "$ins\lib\"
          }
          Copy-Item ".github\cmake\unofficial-webview2-config.cmake"         "$ins\share\unofficial-webview2\"
          Copy-Item ".github\cmake\unofficial-webview2-config-version.cmake" "$ins\share\unofficial-webview2\"
          Write-Host "✅ WebView2 cmake config installed"

      - name: 🎬 Download libmpv x64
        shell: pwsh
        run: |
          # Get latest available libmpv build from shinchiro
          $releases = Invoke-RestMethod "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases?per_page=20"
          $url = $null
          foreach ($rel in $releases) {
            $asset = $rel.assets | Where-Object { $_.name -match "mpv-dev-x86_64.*\.7z$" } | Select-Object -First 1
            if ($asset) { $url = $asset.browser_download_url; break }
          }
          if (-not $url) { throw "Could not find libmpv x64 release" }
          Write-Host "Downloading: $url"
          Invoke-WebRequest $url -OutFile mpv.7z -TimeoutSec 180
          7z x mpv.7z -ompv -y | Out-Null
          New-Item -Force -ItemType Directory "deps\libmpv\x86_64\include" | Out-Null
          Copy-Item "mpv\include\*" "deps\libmpv\x86_64\include\" -Recurse -Force
          Copy-Item "mpv\libmpv.dll.a" "deps\libmpv\x86_64\mpv.lib" -ErrorAction SilentlyContinue
          $dll = Get-ChildItem mpv -Filter "libmpv*.dll" | Select-Object -First 1
          if ($dll) { Copy-Item $dll.FullName "deps\libmpv\x86_64\libmpv-2.dll" }
          Write-Host "✅ libmpv x64 ready"

      - name: 💬 Download Discord RPC
        shell: pwsh
        run: |
          Invoke-WebRequest "https://github.com/discord/discord-rpc/releases/download/v3.4.0/discord-rpc-win.zip" -OutFile drpc.zip -TimeoutSec 60
          Expand-Archive drpc.zip -DestinationPath drpc
          New-Item -Force -ItemType Directory "deps\discord-rpc\win64-static\lib"     | Out-Null
          New-Item -Force -ItemType Directory "deps\discord-rpc\win64-static\include"  | Out-Null
          Copy-Item "drpc\discord-rpc\win64-static\lib\discord-rpc.lib"  "deps\discord-rpc\win64-static\lib\"
          Copy-Item "drpc\discord-rpc\include\*" "deps\discord-rpc\win64-static\include\" -Recurse
          Write-Host "✅ Discord RPC"

      - name: ⚙️ CMake Configure x64
        shell: pwsh
        run: |
          $tc = Join-Path $env:GITHUB_WORKSPACE "vcpkg\scripts\buildsystems\vcpkg.cmake"
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release "-DCMAKE_TOOLCHAIN_FILE=$tc" -DVCPKG_TARGET_TRIPLET=x64-windows-static -B cmake-build-x64 -S .
          if ($LASTEXITCODE -ne 0) { throw "CMake configure failed" }

      - name: 🔨 Build x64
        shell: pwsh
        run: |
          cmake --build cmake-build-x64 --config Release --parallel
          if ($LASTEXITCODE -ne 0) { throw "Build failed" }

      - name: 📦 Auth server npm install
        shell: pwsh
        run: |
          if (Test-Path "packages\darkflix-auth\package.json") {
            Push-Location "packages\darkflix-auth"; npm install --omit=dev --ignore-scripts; Pop-Location
          }

      - name: ⬇️ Download node.exe
        shell: pwsh
        run: |
          Invoke-WebRequest "https://nodejs.org/dist/v22.12.0/node-v22.12.0-win-x64.zip" -OutFile node.zip -TimeoutSec 120
          Expand-Archive node.zip -DestinationPath node-tmp
          Copy-Item "node-tmp\node-v22.12.0-win-x64\node.exe" "cmake-build-x64\node.exe"

      - name: 📁 Prepare dist x64
        shell: pwsh
        run: |
          $dist = "dist-x64"
          New-Item -Force -ItemType Directory $dist | Out-Null
          $exe = Get-ChildItem "cmake-build-x64" -Filter "*.exe" | Where-Object { $_.Name -ne "node.exe" } | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName "$dist\${{ env.PROJECT_NAME }}.exe" }
          @("node.exe") | ForEach-Object { if (Test-Path "cmake-build-x64\$_") { Copy-Item "cmake-build-x64\$_" $dist } }
          if (Test-Path "deps\libmpv\x86_64\libmpv-2.dll") { Copy-Item "deps\libmpv\x86_64\libmpv-2.dll" $dist }
          if (Test-Path "utils\windows\stremio-runtime.exe") { Copy-Item "utils\windows\stremio-runtime.exe" $dist }
          if (Test-Path "utils\windows\server.js") { Copy-Item "utils\windows\server.js" $dist }
          if (Test-Path "packages\darkflix-auth") { Copy-Item "packages\darkflix-auth" "$dist\packages\darkflix-auth" -Recurse }
          Get-ChildItem $dist | Format-Table Name, Length

      - name: 📦 Install NSIS
        run: choco install nsis -y --no-progress --quiet

      - name: 🪟 Build installer x64
        shell: pwsh
        env:
          package_version: ${{ steps.get_version.outputs.version }}
          arch: x64
        run: |
          $n = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (Test-Path $n) { & $n "utils\windows\installer\windows-installer.nsi" }

      - name: 📤 Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: DarkFlix-${{ steps.get_version.outputs.version }}-x64-exe
          path: dist-x64/${{ env.PROJECT_NAME }}.exe
          if-no-files-found: warn
          retention-days: 30

      - name: 📤 Upload installer x64
        uses: actions/upload-artifact@v4
        with:
          name: DarkFlix-${{ steps.get_version.outputs.version }}-x64-setup
          path: "${{ env.APP_DISPLAY_NAME }} ${{ steps.get_version.outputs.version }}-x64.exe"
          if-no-files-found: warn
          retention-days: 30

  build-x86:
    name: 🏗️ Build x86
    runs-on: windows-latest
    needs: build-x64

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔢 Get version
        id: get_version
        shell: pwsh
        run: |
          $raw = Get-Content CMakeLists.txt -Raw
          if ($raw -match 'project\s*\(\s*\w+\s+VERSION\s+"?([\d.]+)"?') {
            "version=$($Matches[1])" | Out-File -Append $env:GITHUB_OUTPUT
          } else { "version=5.0.21" | Out-File -Append $env:GITHUB_OUTPUT }

      - name: 🛠️ Setup MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: ⚡ Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: 💾 Cache vcpkg x86
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg
          key: vcpkg-x86-v7-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: vcpkg-x86-v7-

      - name: 📦 Bootstrap vcpkg x86
        shell: pwsh
        run: |
          $dir = Join-Path $env:GITHUB_WORKSPACE "vcpkg"
          if (-not (Test-Path "$dir\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg $dir --depth=1
            cmd /c "`"$dir\bootstrap-vcpkg.bat`" -disableMetrics"
          }
          Add-Content $env:GITHUB_PATH $dir

      - name: 📦 Install vcpkg packages x86
        shell: pwsh
        run: |
          $vcpkg = Join-Path $env:GITHUB_WORKSPACE "vcpkg\vcpkg.exe"
          & $vcpkg install openssl:x86-windows-static curl:x86-windows-static nlohmann-json:x86-windows-static --triplet x86-windows-static
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed" }

      - name: 📦 Install WebView2 via NuGet x86
        shell: pwsh
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE "nuget_wv2"
          nuget install Microsoft.Web.WebView2 -Version ${{ env.WEBVIEW2_VERSION }} -OutputDirectory $out -NonInteractive
          $pkg = (Get-ChildItem $out -Filter "Microsoft.Web.WebView2.*" | Select-Object -First 1).FullName
          $ins = Join-Path $env:GITHUB_WORKSPACE "vcpkg\installed\x86-windows-static"
          New-Item -Force -ItemType Directory "$ins\include" | Out-Null
          New-Item -Force -ItemType Directory "$ins\lib"     | Out-Null
          New-Item -Force -ItemType Directory "$ins\share\unofficial-webview2" | Out-Null
          Copy-Item "$pkg\build\native\include\*" "$ins\include\" -Recurse -Force
          if (Test-Path "$pkg\build\native\x86\WebView2LoaderStatic.lib") {
            Copy-Item "$pkg\build\native\x86\WebView2LoaderStatic.lib" "$ins\lib\"
          }
          Copy-Item ".github\cmake\unofficial-webview2-config.cmake"         "$ins\share\unofficial-webview2\"
          Copy-Item ".github\cmake\unofficial-webview2-config-version.cmake" "$ins\share\unofficial-webview2\"

      - name: 🎬 Download libmpv x86
        shell: pwsh
        run: |
          $releases = Invoke-RestMethod "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases?per_page=20"
          $url = $null
          foreach ($rel in $releases) {
            $asset = $rel.assets | Where-Object { $_.name -match "mpv-dev-i686.*\.7z$" } | Select-Object -First 1
            if ($asset) { $url = $asset.browser_download_url; break }
          }
          if (-not $url) { throw "Could not find libmpv x86 release" }
          Write-Host "Downloading: $url"
          Invoke-WebRequest $url -OutFile mpv.7z -TimeoutSec 180
          7z x mpv.7z -ompv -y | Out-Null
          New-Item -Force -ItemType Directory "deps\libmpv\i686\include" | Out-Null
          Copy-Item "mpv\include\*" "deps\libmpv\i686\include\" -Recurse -Force
          Copy-Item "mpv\libmpv.dll.a" "deps\libmpv\i686\mpv.lib" -ErrorAction SilentlyContinue
          $dll = Get-ChildItem mpv -Filter "libmpv*.dll" | Select-Object -First 1
          if ($dll) { Copy-Item $dll.FullName "deps\libmpv\i686\libmpv-2.dll" }

      - name: 💬 Download Discord RPC x86
        shell: pwsh
        run: |
          Invoke-WebRequest "https://github.com/discord/discord-rpc/releases/download/v3.4.0/discord-rpc-win.zip" -OutFile drpc.zip -TimeoutSec 60
          Expand-Archive drpc.zip -DestinationPath drpc
          New-Item -Force -ItemType Directory "deps\discord-rpc\win32-static\lib"     | Out-Null
          New-Item -Force -ItemType Directory "deps\discord-rpc\win32-static\include"  | Out-Null
          Copy-Item "drpc\discord-rpc\win32-static\lib\discord-rpc.lib"  "deps\discord-rpc\win32-static\lib\"
          Copy-Item "drpc\discord-rpc\include\*" "deps\discord-rpc\win32-static\include\" -Recurse

      - name: ⚙️ CMake Configure x86
        shell: pwsh
        run: |
          $tc = Join-Path $env:GITHUB_WORKSPACE "vcpkg\scripts\buildsystems\vcpkg.cmake"
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release "-DCMAKE_TOOLCHAIN_FILE=$tc" -DVCPKG_TARGET_TRIPLET=x86-windows-static -B cmake-build-x86 -S .

      - name: 🔨 Build x86
        shell: pwsh
        run: cmake --build cmake-build-x86 --config Release --parallel

      - name: 📦 Install NSIS
        run: choco install nsis -y --no-progress --quiet

      - name: 🪟 Build installer x86
        shell: pwsh
        env:
          package_version: ${{ steps.get_version.outputs.version }}
          arch: x86
        run: |
          $n = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (Test-Path $n) { & $n "utils\windows\installer\windows-installer.nsi" }

      - name: 📤 Upload installer x86
        uses: actions/upload-artifact@v4
        with:
          name: DarkFlix-${{ steps.get_version.outputs.version }}-x86-setup
          path: "${{ env.APP_DISPLAY_NAME }} ${{ steps.get_version.outputs.version }}-x86.exe"
          if-no-files-found: warn
          retention-days: 30

  release:
    name: 🚀 Publish Release
    runs-on: ubuntu-latest
    needs: [build-x64, build-x86]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: ⬇️ Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: 📋 Checksums
        run: cd release && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: 🏷️ Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🎬 DarkFlix v${{ needs.build-x64.outputs.version }}"
          body: |
            ## 🎬 DarkFlix v${{ needs.build-x64.outputs.version }}
            | File | Arch | Type |
            |------|------|------|
            | `DarkFlix ${{ needs.build-x64.outputs.version }}-x64.exe` | 64-bit | Installer |
            | `DarkFlix ${{ needs.build-x64.outputs.version }}-x86.exe` | 32-bit | Installer |
            | `darkflix.exe` | 64-bit | Portable |

            ### Features
            - Orange dark theme
            - Google Sign-In
            - OpenSubtitles Pro (Arabic) built-in
            - Torrentio (quality+Arabic) built-in
            - MPV 4K hardware decoding
          files: release/*
          draft: false
          prerelease: false
