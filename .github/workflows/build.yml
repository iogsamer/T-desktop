name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x64
            triplet: x64-windows-static
          - arch: x86
            triplet: x86-windows-static

    name: Build ${{ matrix.arch }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      # ── vcpkg manual install (fixes error 128 from lukka/run-vcpkg) ──
      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install vcpkg dependencies
        shell: cmd
        run: |
          C:\vcpkg\vcpkg install openssl:${{ matrix.triplet }} curl:${{ matrix.triplet }} nlohmann-json:${{ matrix.triplet }} microsoft-webview2:${{ matrix.triplet }}

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Download libmpv ${{ matrix.arch }}
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $outDir = "deps/libmpv/$( if ($arch -eq 'x64') { 'x86_64' } else { 'i686' } )"
          if (Test-Path $outDir) {
            Write-Host "libmpv already in repo, skipping download."
          } else {
            Write-Error "ERROR: deps/libmpv not found. Add libmpv to your repo under deps/libmpv/"
            exit 1
          }

      - name: Download Discord RPC
        shell: pwsh
        run: |
          $dir = if ("${{ matrix.arch }}" -eq "x64") { "deps/discord-rpc/win64-static" } else { "deps/discord-rpc/win32-static" }
          if (Test-Path $dir) {
            Write-Host "discord-rpc already in repo."
          } else {
            Write-Error "ERROR: deps/discord-rpc not found. Add it to your repo."
            exit 1
          }

      - name: CMake Configure
        shell: cmd
        run: |
          cmake -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} ^
            -B cmake-build-${{ matrix.arch }} ^
            -S .

      - name: Build
        shell: cmd
        run: cmake --build cmake-build-${{ matrix.arch }} --parallel --config Release

      - name: Create Installer
        shell: cmd
        run: node build/deploy_windows.js --installer --arch ${{ matrix.arch }} --version ${{ steps.version.outputs.tag }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darkflix-${{ matrix.arch }}-${{ steps.version.outputs.tag }}
          path: |
            cmake-build-${{ matrix.arch }}/DarkFlix*.exe
            cmake-build-${{ matrix.arch }}/darkflix.exe

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: "DarkFlix v${{ steps.version.outputs.tag }}"
          draft: false
          prerelease: false
          files: dist/**/*
